<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Climb · Calendario</title>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{--bg:#0f0f14;--surface:#16161f;--card:#1c1c28;--border:#2a2a3a;--accent:#7c6af7;--accent2:#f7916a;--accent3:#4fd1c5;--text:#e8e8f0;--muted:#7a7a9a;--success:#56c596;--warning:#f5c842;--danger:#f06b6b;--info:#63a4f5;}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;min-height:100vh;}
#login-screen{min-height:100vh;display:flex;align-items:center;justify-content:center;background:radial-gradient(ellipse at 30% 20%,rgba(124,106,247,.15) 0%,transparent 60%),radial-gradient(ellipse at 80% 80%,rgba(247,145,106,.1) 0%,transparent 50%),var(--bg);}
.login-box{background:var(--card);border:1px solid var(--border);border-radius:20px;padding:48px 40px;width:380px;box-shadow:0 40px 80px rgba(0,0,0,.5);}
.login-pass{width:100%;padding:13px 16px;background:var(--surface);border:1px solid var(--border);border-radius:12px;color:var(--text);font-size:14px;font-family:'DM Sans',sans-serif;outline:none;transition:border-color .2s;margin-bottom:12px;display:block;}
.login-pass:focus{border-color:var(--accent);}
.login-btn{width:100%;padding:14px;background:var(--accent);color:#fff;border:none;border-radius:12px;font-size:15px;font-weight:600;cursor:pointer;font-family:'DM Sans',sans-serif;transition:opacity .2s;margin-bottom:12px;}
.login-btn:hover{opacity:.88;}
.login-error{color:var(--danger);font-size:13px;min-height:18px;text-align:center;}
#app{display:none;}
.sidebar{width:220px;height:100vh;background:var(--surface);border-right:1px solid var(--border);position:fixed;left:0;top:0;display:flex;flex-direction:column;z-index:100;}
.sidebar-logo{padding:22px 18px 14px;}
.nav{flex:1;padding:8px 10px;overflow-y:auto;}
.nav-item{width:100%;padding:10px 12px;background:none;border:none;border-radius:10px;color:var(--muted);cursor:pointer;font-size:13px;font-family:'DM Sans',sans-serif;display:flex;align-items:center;gap:10px;text-align:left;transition:all .15s;margin-bottom:2px;}
.nav-item:hover{background:rgba(255,255,255,.05);color:var(--text);}
.nav-item.active{background:rgba(124,106,247,.15);color:var(--accent);font-weight:600;}
.nav-item .icon{font-size:16px;width:20px;text-align:center;}
.sidebar-status{padding:8px 16px;border-top:1px solid var(--border);}
.sidebar-user{padding:12px 14px;border-top:1px solid var(--border);display:flex;align-items:center;gap:10px;}
.avatar{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:13px;flex-shrink:0;}
.sidebar-user-info{flex:1;overflow:hidden;}
.sidebar-user-info strong{display:block;font-size:13px;}
.sidebar-user-info span{font-size:11px;color:var(--muted);}
.logout-btn{background:none;border:none;color:var(--muted);cursor:pointer;font-size:16px;padding:4px;}
.logout-btn:hover{color:var(--danger);}
.main{margin-left:220px;padding:28px;min-height:100vh;}
.page{display:none;}.page.active{display:block;}
.page-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:24px;gap:12px;}
.page-title{font-size:24px;font-weight:700;margin-bottom:4px;}
.page-sub{font-size:13px;color:var(--muted);}
.btn{padding:9px 16px;border-radius:10px;border:none;cursor:pointer;font-size:13px;font-family:'DM Sans',sans-serif;font-weight:600;transition:all .15s;}
.btn-primary{background:var(--accent);color:#fff;}.btn-primary:hover{opacity:.88;}
.btn-ghost{background:rgba(255,255,255,.06);color:var(--text);border:1px solid var(--border);}.btn-ghost:hover{background:rgba(255,255,255,.1);}
.btn-sm{padding:5px 10px;font-size:12px;border-radius:7px;}
.stats-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:24px;}
.stat-card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:20px;position:relative;overflow:hidden;}
.stat-card.purple{border-color:rgba(124,106,247,.3);background:rgba(124,106,247,.08);}
.stat-card.orange{border-color:rgba(247,145,106,.3);background:rgba(247,145,106,.08);}
.stat-card.green{border-color:rgba(86,197,150,.3);background:rgba(86,197,150,.08);}
.stat-card.teal{border-color:rgba(79,209,197,.3);background:rgba(79,209,197,.08);}
.stat-val{font-size:32px;font-weight:800;margin-bottom:4px;}
.stat-label{font-size:12px;color:var(--muted);}
.stat-icon{position:absolute;right:16px;top:16px;font-size:22px;opacity:.4;}
.filters{display:flex;gap:10px;margin-bottom:16px;flex-wrap:wrap;}
.search-input{flex:1;min-width:200px;padding:9px 14px;background:var(--surface);border:1px solid var(--border);border-radius:10px;color:var(--text);font-size:13px;font-family:'DM Sans',sans-serif;outline:none;}
.search-input:focus{border-color:var(--accent);}
.filter-select{padding:9px 12px;background:var(--surface);border:1px solid var(--border);border-radius:10px;color:var(--text);font-size:13px;font-family:'DM Sans',sans-serif;outline:none;cursor:pointer;}
.table-wrap{background:var(--card);border:1px solid var(--border);border-radius:14px;overflow:hidden;}
table{width:100%;border-collapse:collapse;}
th{padding:11px 14px;text-align:left;font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;background:var(--surface);border-bottom:1px solid var(--border);}
td{padding:10px 14px;font-size:13px;border-bottom:1px solid rgba(255,255,255,.04);}
tr:last-child td{border-bottom:none;}
tr:hover td{background:rgba(255,255,255,.02);}
.dia-chip{background:rgba(124,106,247,.12);color:var(--accent);font-size:11px;font-weight:600;padding:2px 8px;border-radius:6px;}
.resp-chip{font-size:11px;font-weight:700;padding:2px 9px;border-radius:20px;}
.resp-kevin{background:rgba(247,145,106,.15);color:#f7916a;}
.resp-jose{background:rgba(124,106,247,.15);color:#7c6af7;}
.resp-elias{background:rgba(79,209,197,.15);color:#4fd1c5;}
.resp-rocio{background:rgba(244,114,182,.15);color:#f472b6;}
.resp-admin{background:rgba(124,106,247,.15);color:#7c6af7;}
.empty{text-align:center;padding:60px 20px;color:var(--muted);}
.empty-icon{font-size:40px;margin-bottom:12px;}
.kanban{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:12px;}
.kanban-col{background:var(--card);border:1px solid var(--border);border-radius:12px;overflow:hidden;}
.kanban-col-head{padding:10px 12px;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid var(--border);}
.kanban-col-head h4{font-size:12px;font-weight:700;}
.kanban-count{background:rgba(255,255,255,.1);font-size:11px;font-weight:700;padding:1px 7px;border-radius:20px;}
.kanban-items{padding:8px;}
.kanban-card{background:var(--surface);border-radius:8px;padding:8px 10px;margin-bottom:6px;border:1px solid var(--border);}
.kanban-card-company{font-size:12px;font-weight:700;margin-bottom:4px;}
.kanban-card-meta{display:flex;gap:4px;flex-wrap:wrap;}
.cal-months{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:16px;}
.cal-month{background:var(--card);border:1px solid var(--border);border-radius:12px;overflow:hidden;}
.cal-month-head{padding:12px 16px;background:var(--surface);border-bottom:1px solid var(--border);}
.cal-month-head h3{font-size:13px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--accent);}
.cal-event{display:flex;gap:12px;padding:9px 16px;border-bottom:1px solid rgba(255,255,255,.04);align-items:center;}
.cal-date{font-size:11px;color:var(--accent);font-weight:700;min-width:60px;}
.cal-desc{font-size:12px;}
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:500;align-items:center;justify-content:center;}
.modal-overlay.open{display:flex;}
.modal{background:var(--card);border:1px solid var(--border);border-radius:18px;width:460px;max-width:95vw;max-height:90vh;overflow-y:auto;box-shadow:0 40px 80px rgba(0,0,0,.6);}
.modal-header{padding:20px 24px 16px;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid var(--border);}
.modal-header h3{font-size:16px;font-weight:700;}
.modal-close{background:none;border:none;color:var(--muted);cursor:pointer;font-size:18px;padding:2px 6px;}
.modal-close:hover{color:var(--text);}
.modal-body{padding:20px 24px;display:flex;flex-direction:column;gap:14px;}
.modal-footer{padding:16px 24px;border-top:1px solid var(--border);display:flex;justify-content:flex-end;gap:10px;}
.form-label{display:block;font-size:12px;font-weight:600;color:var(--muted);margin-bottom:6px;text-transform:uppercase;letter-spacing:.05em;}
.form-input{width:100%;padding:11px 14px;background:var(--surface);border:1px solid var(--border);border-radius:10px;color:var(--text);font-size:13px;font-family:'DM Sans',sans-serif;outline:none;}
.form-input:focus{border-color:var(--accent);}
.toast{position:fixed;bottom:24px;right:24px;padding:12px 20px;border-radius:12px;color:#fff;font-size:13px;font-weight:600;opacity:0;transform:translateY(10px);transition:all .3s;z-index:1000;pointer-events:none;}
.toast.show{opacity:1;transform:translateY(0);}
#menu-btn{display:none;position:fixed;top:12px;left:12px;z-index:400;background:var(--card);border:1px solid var(--border);border-radius:10px;width:42px;height:42px;font-size:20px;cursor:pointer;color:var(--text);box-shadow:0 4px 16px rgba(0,0,0,.4);align-items:center;justify-content:center;}
#mob-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:199;}
@media(max-width:768px){
  #menu-btn{display:flex;}
  .sidebar{position:fixed;left:0;top:0;height:100vh;transform:translateX(-100%);transition:transform .25s ease;z-index:200;}
  .sidebar.mob-open{transform:translateX(0);}
  #mob-overlay.mob-open{display:block;}
  .main{margin-left:0!important;padding:68px 14px 20px!important;}
  .login-box{width:94vw!important;padding:28px 18px!important;}
  .page-header{flex-direction:column!important;align-items:flex-start!important;gap:10px!important;}
  .stats-grid{grid-template-columns:1fr 1fr!important;}
  .filters{flex-direction:column!important;}
  .search-input,.filter-select{width:100%!important;}
  .table-wrap{overflow-x:auto!important;-webkit-overflow-scrolling:touch;}
  table{min-width:580px;}
  .kanban{grid-template-columns:1fr!important;}
  .cal-months{grid-template-columns:1fr!important;}
  .modal{width:96vw!important;max-width:96vw!important;}
  .page-title{font-size:19px!important;}
  td:nth-child(6),th:nth-child(6){display:none;}
}
</style>
</head>

function mobToggle(){document.querySelector('.sidebar').classList.toggle('mob-open');document.getElementById('mob-overlay').classList.toggle('mob-open');}
function mobClose(){if(window.innerWidth<=768){document.querySelector('.sidebar').classList.remove('mob-open');document.getElementById('mob-overlay').classList.remove('mob-open');}}

let AUDIT_LOG=[];
function logAudit(action,detail){
  const now=new Date();
  const ts=now.toLocaleDateString('es-PY')+' '+now.toLocaleTimeString('es-PY',{hour:'2-digit',minute:'2-digit'});
  AUDIT_LOG.unshift({ts,user:currentUser||'sistema',action,detail});
  if(AUDIT_LOG.length>200)AUDIT_LOG.pop();
  try{localStorage.setItem('climb_audit',JSON.stringify(AUDIT_LOG));}catch(e){}
}
function loadAudit(){try{const s=localStorage.getItem('climb_audit');if(s)AUDIT_LOG=JSON.parse(s);}catch(e){}}

function doLogin(){
  const sel=document.getElementById('user-select');
  const passEl=document.getElementById('login-pass');
  const err=document.getElementById('login-error');
  const u=sel?sel.value:'';
  const pass=passEl?passEl.value:'';
  if(!u){err.textContent='Seleccioná un usuario';return;}
  if(!USERS[u]){err.textContent='Usuario no encontrado';return;}
  if(pass!==USERS[u].pass){err.textContent='Contraseña incorrecta';return;}
  currentUser=u; err.textContent='';
  logAudit('🔐 Ingresó','como '+USERS[u].role);
  document.getElementById('login-screen').style.display='none';
  document.getElementById('app').style.display='block';
  initApp();
}

function logout(){
  currentUser=null;
  document.getElementById('login-screen').style.display='flex';
  document.getElementById('app').style.display='none';
  document.getElementById('login-pass').value='';
  const s=document.getElementById('user-select');if(s)s.value='';
}

function initApp(){
  const u=USERS[currentUser];
  const av=document.getElementById('user-avatar');
  av.style.background=u.color+'33';av.style.color=u.color;av.style.border='1px solid '+u.color+'44';
  av.textContent=currentUser.charAt(0).toUpperCase();
  document.getElementById('user-name-display').textContent=currentUser.charAt(0).toUpperCase()+currentUser.slice(1);
  document.getElementById('user-role-display').textContent=u.role;
  const nav=document.getElementById('nav-items');nav.innerHTML='';
  NAV_CONFIG.forEach(item=>{
    if(!u.pages.includes(item.id))return;
    const btn=document.createElement('button');
    btn.className='nav-item';btn.dataset.page=item.id;
    btn.innerHTML='<span class="icon">'+item.icon+'</span>'+item.label;
    btn.onclick=()=>goTo(item.id);
    nav.appendChild(btn);
  });
  goTo('dashboard');
}

function goTo(page){
  currentPage=page;mobClose();
  document.querySelectorAll('.nav-item').forEach(b=>b.classList.toggle('active',b.dataset.page===page));
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  const el=document.getElementById('page-'+page);if(el)el.classList.add('active');
  const renderers={
    dashboard:renderDashboard,
    publicaciones:()=>renderTable('pub','page-publicaciones','Publicaciones Generales','📋'),
    cooperativas:()=>renderTable('coop','page-cooperativas','Cooperativas','🤝'),
    ccu:()=>renderTable('ccu','page-ccu','CCU Central','⚡'),
    festivos:()=>renderTable('fest','page-festivos','Días Festivos','🎉'),
    calendario:renderCalendario,instrucciones:renderInstrucciones,
    premio:renderPremio,usuarios:renderUsuarios,auditoria:renderAuditoria,
  };
  if(renderers[page])renderers[page]();
}

function renderKanban(items){
  const states=['Publicado','Pendiente','Diseñado','Diseñando','Aprobado','Programado','Modificar','Esperando aprobación'];
  return '<div class="kanban">'+states.map(s=>{
    const grp=items.filter(r=>r.estado===s);if(!grp.length)return '';
    const col=ESTADO_COLORS[s]||'var(--border)';
    return `<div class="kanban-col"><div class="kanban-col-head" style="border-left:3px solid ${col};"><h4>${s}</h4><span class="kanban-count">${grp.length}</span></div>
      <div class="kanban-items">${grp.slice(0,10).map(r=>`<div class="kanban-card"><div class="kanban-card-company">${r.empresa||'—'}</div>
        <div class="kanban-card-meta">${r.dia?`<span class="dia-chip">${r.dia}</span>`:''} ${r.encargado?`<span class="resp-chip resp-${r.encargado.toLowerCase()}">${r.encargado}</span>`:''}</div>
        ${r.contenido?`<div style="font-size:11px;color:var(--muted);margin-top:4px;">${r.contenido}</div>`:''}</div>`).join('')}
        ${grp.length>10?`<div style="font-size:11px;color:var(--muted);text-align:center;padding:4px;">+${grp.length-10} más</div>`:''}
      </div></div>`;
  }).join('')+'</div>';
}

function filterTable(key,pageId){
  const q=(document.getElementById('search-'+key)||{}).value?.toLowerCase()||'';
  const est=(document.getElementById('filter-est-'+key)||{}).value||'';
  const enc=(document.getElementById('filter-enc-'+key)||{}).value||'';
  const dia=(document.getElementById('filter-dia-'+key)||{}).value||'';
  if(FILTER_STATE[key])FILTER_STATE[key]={q,est,enc,dia};
  const filtered=DATA[key].filter(r=>{
    return (!q||(r.empresa+r.contenido+r.comentario).toLowerCase().includes(q))&&
           (!est||r.estado===est)&&(!enc||r.encargado===enc)&&(!dia||r.dia===dia);
  });
  const tw=document.getElementById('table-'+key);
  if(tw)tw.innerHTML=buildTableHTML(key,filtered);
}

function buildTableHTML(key,rows){
  if(!rows.length)return '<div class="empty"><div class="empty-icon">🔍</div><p>No hay resultados con estos filtros</p></div>';
  const sorted=[...rows].sort((a,b)=>(a.empresa||'').localeCompare(b.empresa||'','es'));
  const groups=[];let lastEmp=null;
  sorted.forEach(r=>{
    const emp=r.empresa||'—';
    if(emp!==lastEmp){groups.push({empresa:emp,rows:[]});lastEmp=emp;}
    groups[groups.length-1].rows.push(r);
  });
  const companyColor={};
  groups.forEach((g,i)=>{companyColor[g.empresa]=COMPANY_PALETTE[i%COMPANY_PALETTE.length];});
  const bodyRows=groups.map(g=>{
    const col=companyColor[g.empresa];const multi=g.rows.length>1;
    const header=multi?`<tr><td colspan="7" style="padding:7px 14px 5px;background:${col}10;border-left:3px solid ${col};border-top:2px solid ${col}30;border-bottom:1px solid ${col}20;">
      <div style="display:flex;align-items:center;gap:8px;">
        <div style="width:7px;height:7px;border-radius:50%;background:${col};"></div>
        <span style="font-size:12px;font-weight:800;color:${col};letter-spacing:.04em;text-transform:uppercase;">${g.empresa}</span>
        <span style="font-size:11px;color:${col}88;">${g.rows.length} publicaciones</span>
      </div></td></tr>`:'';
    const dataRows=g.rows.map((r,ri)=>{
      const idx=DATA[key].indexOf(r);const ecol=ESTADO_COLORS[r.estado]||'#aaa';
      const isLast=ri===g.rows.length-1;
      return `<tr style="border-left:3px solid ${multi?col+'40':col};${isLast&&multi?'border-bottom:2px solid '+col+'20;':''}">
        <td style="padding-left:${multi?'22px':'14px'};"><strong style="color:${multi?'var(--text)':col};">${r.empresa||'—'}</strong></td>
        <td>${r.dia?`<span class="dia-chip">${r.dia}</span>`:'<span style="color:var(--muted)">—</span>'}</td>
        <td style="color:var(--muted);font-size:12px;">${r.contenido||'—'}</td>

        </td>
      </tr>`;
    }).join('');
    return header+dataRows;
  }).join('');
  return `<table><thead><tr><th>Empresa</th><th>Día</th><th>Contenido</th><th>Estado</th><th>Encargado</th><th>Comentario</th><th></th></tr></thead><tbody>${bodyRows}</tbody></table>`;
}

async function savePub(){
  const empresa=document.getElementById('pub-empresa').value.trim();
  if(!empresa){showToast('Ingresa el nombre de la empresa',true);return;}
  const record={empresa,dia:document.getElementById('pub-dia').value,contenido:document.getElementById('pub-contenido').value,estado:document.getElementById('pub-estado').value,encargado:document.getElementById('pub-encargado').value,comentario:document.getElementById('pub-comentario').value};
  const key=document.getElementById('pub-seccion').value;
  const idxStr=document.getElementById('pub-edit-idx').value;
  showToast('Guardando... ⏳');
  try{
    if(idxStr!==''){
      const existingId=DATA[editKey||key][parseInt(idxStr)]?._id;
      const clean={...record};delete clean._id;
      await db.collection(editKey||key).doc(existingId).set(clean);
      logAudit('✏️ Editó',empresa+' → '+record.estado);
      showToast('Actualizado ✓');
    }else{
      const id=Date.now().toString()+Math.random().toString(36).slice(2,6);
      await db.collection(key).doc(id).set(record);
      logAudit('➕ Agregó',empresa+' en '+key);
      showToast('Agregado ✓');
    }
    closeModal('modal-pub');
    const pageMap={pub:'page-publicaciones',coop:'page-cooperativas',ccu:'page-ccu',fest:'page-festivos'};
    const pnMap={pub:'publicaciones',coop:'cooperativas',ccu:'ccu',fest:'festivos'};
    const k=editKey||key;
    if(pageMap[k]&&currentPage===pnMap[k])filterTable(k,pageMap[k]);
    else goTo(currentPage);
  }catch(e){showToast('Error al guardar',true);console.error(e);}
}
async function quickEstado(key,idx,newEstado){
  const record={...DATA[key][idx],estado:newEstado};const id=DATA[key][idx]?._id;
  delete record._id;
  try{
    await db.collection(key).doc(id).set(record);
    DATA[key][idx].estado=newEstado;
    logAudit('🔄 Estado',DATA[key][idx].empresa+' → '+newEstado);
    const pm={pub:'page-publicaciones',coop:'page-cooperativas',ccu:'page-ccu',fest:'page-festivos'};
    if(pm[key])filterTable(key,pm[key]);
    showToast('Estado actualizado ✓');
  }catch(e){showToast('Error',true);}
}
async function deletePub(key,idx){
  if(!confirm('¿Eliminar esta publicación?'))return;
  const id=DATA[key][idx]?._id;if(!id)return;
  try{
    await db.collection(key).doc(id).delete();
    logAudit('🗑️ Eliminó',(DATA[key][idx].empresa||'')+' de '+key);
    showToast('Eliminado ✓');
  }catch(e){showToast('Error al eliminar',true);}
}

function saveUser(){
  const existingKey=document.getElementById('edit-user-key').value;
  const keyRaw=document.getElementById('user-key-input').value.trim().toLowerCase().replace(/\s+/g,'');
  const pass=document.getElementById('user-pass-input').value.trim();
  const role=document.getElementById('user-role-input').value;
  const color=document.getElementById('user-color-input').value;
  if(!keyRaw||!pass){showToast('Completá todos los campos',true);return;}
  const allPages=['dashboard','publicaciones','cooperativas','ccu','festivos','calendario','instrucciones','premio'];
  if(existingKey){
    USERS[existingKey].pass=pass;USERS[existingKey].role=role;USERS[existingKey].color=color;
    logAudit('✏️ Editó usuario',existingKey+' → '+role);showToast('Usuario actualizado ✓');
  }else{
    if(USERS[keyRaw]){showToast('Ese usuario ya existe',true);return;}
    USERS[keyRaw]={pass,role,color,pages:allPages};
    const sel=document.getElementById('user-select');
    if(sel){const opt=document.createElement('option');opt.value=keyRaw;opt.textContent=keyRaw.charAt(0).toUpperCase()+keyRaw.slice(1)+' — '+role;sel.appendChild(opt);}
    logAudit('➕ Creó usuario',keyRaw+' ('+role+')');showToast('Usuario creado ✓');
  }
  closeModal('modal-user');goTo('usuarios');
}
function deleteUser(key){
  if(!confirm('¿Eliminar al usuario '+key+'?'))return;
  logAudit('🗑️ Eliminó usuario',key);delete USERS[key];
  const sel=document.getElementById('user-select');
  if(sel){const opt=[...sel.options].find(o=>o.value===key);if(opt)sel.removeChild(opt);}
  showToast('Usuario eliminado ✓');goTo('usuarios');
}

            <div><div style="font-size:12px;font-weight:700;">${u.charAt(0).toUpperCase()+u.slice(1)}</div><div style="font-size:11px;color:var(--muted);">${logs.length} acciones</div></div>
          </div>

          <td><span style="background:${col}22;color:${col};font-size:11px;font-weight:700;padding:2px 8px;border-radius:20px;">${e.user.charAt(0).toUpperCase()+e.user.slice(1)}</span></td>

          <td style="font-size:12px;color:var(--muted);">${e.detail}</td>
        </tr>`;}).join('')}
      </tbody></table></div>`}
  `;
}

function showToast(msg,err=false){
  const t=document.getElementById('toast');
  t.textContent=msg;t.style.background=err?'var(--danger)':'var(--success)';
  t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2500);
}

const fbApp=firebase.initializeApp(firebaseConfig);
const db=firebase.firestore();

function setOnlineStatus(online){const el=document.getElementById('online-status');if(!el)return;el.textContent=online?'🟢 En línea':'🔴 Sin conexión';el.style.color=online?'var(--success)':'var(--danger)';}
const SECTIONS=['pub','coop','ccu','fest'];

function initFirebase(){
  SECTIONS.forEach(sec=>{
    db.collection(sec).onSnapshot(snapshot=>{
      DATA[sec]=[];snapshot.forEach(d=>DATA[sec].push({_id:d.id,...d.data()}));
      setOnlineStatus(true);
      if(currentUser){const pm={pub:'publicaciones',coop:'cooperativas',ccu:'ccu',fest:'festivos'};if(currentPage===pm[sec]||currentPage==='dashboard')goTo(currentPage);}
    },err=>{setOnlineStatus(false);console.error(err);});
  });
}

async function uploadInitialDataIfEmpty(){
  for(const sec of SECTIONS){
    const snap=await db.collection(sec).get();
    if(snap.empty){
      for(const rec of DATA[sec]){
        const id=Date.now().toString()+Math.random().toString(36).slice(2,6);
        const clean={...rec};delete clean._id;
        await db.collection(sec).doc(id).set(clean);
        await new Promise(r=>setTimeout(r,30));
      }
    }
  }
}

document.addEventListener('DOMContentLoaded',()=>{
  document.getElementById('login-pass').addEventListener('keydown',e=>{if(e.key==='Enter')doLogin();});
  loadAudit();
  uploadInitialDataIfEmpty().then(()=>initFirebase());
});
