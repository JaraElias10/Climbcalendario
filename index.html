<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Calendario de Publicaciones</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0f0f14;
    --surface: #16161f;
    --card: #1c1c28;
    --border: #2a2a3a;
    --accent: #7c6af7;
    --accent2: #f7916a;
    --accent3: #4fd1c5;
    --text: #e8e8f0;
    --muted: #7a7a9a;
    --success: #56c596;
    --warning: #f5c842;
    --danger: #f06b6b;
    --info: #63a4f5;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:var(--bg); color:var(--text); font-family:'DM Sans',sans-serif; min-height:100vh; }

  /* ===== LOGIN ===== */
  #login-screen {
    min-height:100vh; display:flex; align-items:center; justify-content:center;
    background: radial-gradient(ellipse at 30% 20%, rgba(124,106,247,0.15) 0%, transparent 60%),
                radial-gradient(ellipse at 80% 80%, rgba(247,145,106,0.1) 0%, transparent 50%),
                var(--bg);
  }
  .login-box {
    background:var(--card); border:1px solid var(--border); border-radius:20px;
    padding:48px 40px; width:380px; text-align:center;
    box-shadow:0 40px 80px rgba(0,0,0,0.5);
  }
  .login-logo { font-family:'DM Serif Display',serif; font-size:28px; color:var(--text); margin-bottom:6px; }
  .login-logo span { color:var(--accent); }
  .login-sub { color:var(--muted); font-size:13px; margin-bottom:36px; }
  .login-label { display:flex; gap:10px; margin-bottom:12px; flex-wrap:wrap; justify-content:center; }
  .user-btn {
    padding:10px 16px; border-radius:10px; border:1px solid var(--border);
    background:var(--surface); color:var(--text); cursor:pointer; font-size:13px;
    transition:all .2s; font-family:'DM Sans',sans-serif; font-weight:500;
  }
  .user-btn:hover { border-color:var(--accent); background:rgba(124,106,247,0.12); }
  .user-btn.active { border-color:var(--accent); background:rgba(124,106,247,0.2); color:var(--accent); }
  .login-pass { 
    width:100%; padding:12px 16px; background:var(--surface); border:1px solid var(--border);
    border-radius:10px; color:var(--text); font-size:14px; margin:16px 0; outline:none;
    font-family:'DM Sans',sans-serif;
  }
  .login-pass:focus { border-color:var(--accent); }
  .login-btn {
    width:100%; padding:13px; background:var(--accent); border:none; border-radius:10px;
    color:#fff; font-size:15px; font-weight:600; cursor:pointer; transition:.2s;
    font-family:'DM Sans',sans-serif;
  }
  .login-btn:hover { background:#6a59e0; }
  .login-error { color:var(--danger); font-size:12px; margin-top:8px; }

  /* ===== APP LAYOUT ===== */
  #app { display:none; }
  .sidebar {
    position:fixed; top:0; left:0; bottom:0; width:220px;
    background:var(--surface); border-right:1px solid var(--border);
    display:flex; flex-direction:column; z-index:100;
  }
  .sidebar-logo { padding:24px 20px; border-bottom:1px solid var(--border); }
  .sidebar-logo h1 { font-family:'DM Serif Display',serif; font-size:18px; line-height:1.2; }
  .sidebar-logo h1 span { color:var(--accent); }
  .sidebar-logo p { color:var(--muted); font-size:11px; margin-top:2px; }
  .nav { flex:1; padding:16px 12px; display:flex; flex-direction:column; gap:4px; overflow-y:auto; }
  .nav-item {
    padding:9px 12px; border-radius:9px; cursor:pointer; font-size:13px; font-weight:500;
    color:var(--muted); transition:.15s; display:flex; align-items:center; gap:9px;
    border:none; background:none; width:100%; text-align:left; font-family:'DM Sans',sans-serif;
  }
  .nav-item:hover { background:rgba(255,255,255,0.05); color:var(--text); }
  .nav-item.active { background:rgba(124,106,247,0.15); color:var(--accent); }
  .nav-item .icon { font-size:16px; width:20px; text-align:center; }
  .nav-sep { height:1px; background:var(--border); margin:8px 0; }
  .sidebar-user {
    padding:16px 16px; border-top:1px solid var(--border);
    display:flex; align-items:center; gap:10px;
  }
  .avatar {
    width:34px; height:34px; border-radius:50%; display:flex; align-items:center;
    justify-content:center; font-size:13px; font-weight:700; flex-shrink:0;
  }
  .sidebar-user-info { flex:1; min-width:0; }
  .sidebar-user-info strong { font-size:13px; display:block; }
  .sidebar-user-info span { font-size:11px; color:var(--muted); }
  .logout-btn { 
    background:none; border:none; color:var(--muted); cursor:pointer; font-size:16px;
    padding:4px; border-radius:4px; transition:.15s;
  }
  .logout-btn:hover { color:var(--danger); }

  .main { margin-left:220px; min-height:100vh; padding:30px; }
  .page { display:none; }
  .page.active { display:block; }

  /* ===== HEADER ===== */
  .page-header { display:flex; align-items:flex-start; justify-content:space-between; margin-bottom:28px; gap:16px; flex-wrap:wrap; }
  .page-title { font-family:'DM Serif Display',serif; font-size:26px; }
  .page-sub { color:var(--muted); font-size:13px; margin-top:4px; }

  /* ===== STATS ===== */
  .stats-grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(180px,1fr)); gap:16px; margin-bottom:28px; }
  .stat-card {
    background:var(--card); border:1px solid var(--border); border-radius:14px; padding:20px;
    position:relative; overflow:hidden;
  }
  .stat-card::before {
    content:''; position:absolute; top:-20px; right:-20px; width:80px; height:80px;
    border-radius:50%; opacity:0.08;
  }
  .stat-card.purple::before { background:var(--accent); }
  .stat-card.orange::before { background:var(--accent2); }
  .stat-card.teal::before { background:var(--accent3); }
  .stat-card.green::before { background:var(--success); }
  .stat-val { font-size:30px; font-weight:700; margin-bottom:4px; }
  .stat-label { color:var(--muted); font-size:12px; }
  .stat-icon { position:absolute; top:16px; right:16px; font-size:22px; opacity:0.4; }

  /* ===== FILTERS ===== */
  .filters { display:flex; gap:10px; margin-bottom:20px; flex-wrap:wrap; }
  .filter-select {
    padding:8px 12px; background:var(--card); border:1px solid var(--border);
    border-radius:9px; color:var(--text); font-size:13px; outline:none; cursor:pointer;
    font-family:'DM Sans',sans-serif;
  }
  .filter-select:focus { border-color:var(--accent); }
  .search-input {
    padding:8px 14px; background:var(--card); border:1px solid var(--border);
    border-radius:9px; color:var(--text); font-size:13px; outline:none; flex:1; min-width:200px;
    font-family:'DM Sans',sans-serif;
  }
  .search-input:focus { border-color:var(--accent); }
  .btn {
    padding:9px 18px; border-radius:9px; border:none; cursor:pointer; font-size:13px;
    font-weight:600; transition:.15s; font-family:'DM Sans',sans-serif;
  }
  .btn-primary { background:var(--accent); color:#fff; }
  .btn-primary:hover { background:#6a59e0; }
  .btn-sm { padding:5px 12px; font-size:12px; border-radius:7px; }
  .btn-ghost { background:transparent; border:1px solid var(--border); color:var(--text); }
  .btn-ghost:hover { border-color:var(--accent); color:var(--accent); }

  /* ===== TABLE ===== */
  .table-wrap { background:var(--card); border:1px solid var(--border); border-radius:14px; overflow:hidden; }
  table { width:100%; border-collapse:collapse; }
  th { padding:12px 16px; text-align:left; font-size:11px; font-weight:600; color:var(--muted); text-transform:uppercase; letter-spacing:.06em; border-bottom:1px solid var(--border); background:var(--surface); }
  td { padding:12px 16px; font-size:13px; border-bottom:1px solid rgba(255,255,255,0.04); }
  tr:last-child td { border-bottom:none; }
  tr:hover td { background:rgba(255,255,255,0.025); }

  /* ===== BADGES ===== */
  .badge {
    padding:3px 10px; border-radius:20px; font-size:11px; font-weight:600;
    display:inline-block; white-space:nowrap;
  }
  .badge-publicado { background:rgba(86,197,150,0.15); color:var(--success); }
  .badge-pendiente { background:rgba(245,200,66,0.15); color:var(--warning); }
  .badge-disenado { background:rgba(99,164,245,0.15); color:var(--info); }
  .badge-disenando { background:rgba(124,106,247,0.15); color:var(--accent); }
  .badge-programado { background:rgba(79,209,197,0.15); color:var(--accent3); }
  .badge-modificar { background:rgba(240,107,107,0.15); color:var(--danger); }
  .badge-esp { background:rgba(247,145,106,0.15); color:var(--accent2); }
  .badge-na { background:rgba(122,122,154,0.1); color:var(--muted); }

  /* ===== RESPONSABLE CHIPS ===== */
  .resp-chip {
    padding:2px 9px; border-radius:20px; font-size:11px; font-weight:600; display:inline-block;
  }
  .resp-kevin { background:rgba(247,145,106,0.15); color:var(--accent2); }
  .resp-jose { background:rgba(124,106,247,0.15); color:var(--accent); }
  .resp-elias { background:rgba(79,209,197,0.15); color:var(--accent3); }
  .resp-rocio { background:rgba(244,114,182,0.15); color:#f472b6; }

  /* ===== DIA CHIPS ===== */
  .dia-chip {
    padding:2px 8px; border-radius:6px; font-size:11px; background:rgba(255,255,255,0.07);
    color:var(--muted); display:inline-block;
  }

  /* ===== MODAL ===== */
  .modal-overlay {
    position:fixed; inset:0; background:rgba(0,0,0,0.7); z-index:1000;
    display:flex; align-items:center; justify-content:center; padding:20px;
    opacity:0; pointer-events:none; transition:.2s;
  }
  .modal-overlay.open { opacity:1; pointer-events:all; }
  .modal {
    background:var(--card); border:1px solid var(--border); border-radius:16px;
    width:100%; max-width:520px; max-height:90vh; overflow-y:auto;
    transform:translateY(20px); transition:.2s;
  }
  .modal-overlay.open .modal { transform:translateY(0); }
  .modal-header { padding:20px 24px 16px; border-bottom:1px solid var(--border); display:flex; justify-content:space-between; align-items:center; }
  .modal-header h3 { font-family:'DM Serif Display',serif; font-size:18px; }
  .modal-close { background:none; border:none; color:var(--muted); cursor:pointer; font-size:20px; transition:.15s; }
  .modal-close:hover { color:var(--text); }
  .modal-body { padding:20px 24px; }
  .form-row { margin-bottom:16px; }
  .form-label { font-size:12px; font-weight:600; color:var(--muted); text-transform:uppercase; letter-spacing:.05em; margin-bottom:6px; display:block; }
  .form-input {
    width:100%; padding:10px 14px; background:var(--surface); border:1px solid var(--border);
    border-radius:9px; color:var(--text); font-size:13px; outline:none;
    font-family:'DM Sans',sans-serif;
  }
  .form-input:focus { border-color:var(--accent); }
  .form-row-2 { display:grid; grid-template-columns:1fr 1fr; gap:12px; }
  .modal-footer { padding:16px 24px; border-top:1px solid var(--border); display:flex; justify-content:flex-end; gap:10px; }

  /* ===== CALENDAR ===== */
  .cal-months { display:grid; grid-template-columns:repeat(auto-fill,minmax(280px,1fr)); gap:16px; }
  .cal-month { background:var(--card); border:1px solid var(--border); border-radius:14px; overflow:hidden; }
  .cal-month-head { padding:14px 18px; background:rgba(124,106,247,0.08); border-bottom:1px solid var(--border); }
  .cal-month-head h3 { font-family:'DM Serif Display',serif; font-size:16px; }
  .cal-event { padding:10px 18px; border-bottom:1px solid rgba(255,255,255,0.04); display:flex; gap:12px; align-items:flex-start; }
  .cal-event:last-child { border-bottom:none; }
  .cal-date { font-size:12px; color:var(--accent); font-weight:600; white-space:nowrap; min-width:60px; }
  .cal-desc { font-size:13px; color:var(--text); }

  /* ===== KANBAN ===== */
  .kanban { display:grid; grid-template-columns:repeat(auto-fill,minmax(240px,1fr)); gap:16px; }
  .kanban-col { background:var(--card); border:1px solid var(--border); border-radius:14px; overflow:hidden; }
  .kanban-col-head { padding:12px 16px; border-bottom:1px solid var(--border); display:flex; align-items:center; justify-content:space-between; }
  .kanban-col-head h4 { font-size:13px; font-weight:600; }
  .kanban-count { font-size:11px; padding:2px 8px; border-radius:20px; background:rgba(255,255,255,0.08); color:var(--muted); }
  .kanban-items { padding:12px; display:flex; flex-direction:column; gap:8px; max-height:500px; overflow-y:auto; }
  .kanban-card { background:var(--surface); border:1px solid var(--border); border-radius:10px; padding:12px; }
  .kanban-card-company { font-size:13px; font-weight:600; margin-bottom:6px; }
  .kanban-card-meta { display:flex; gap:6px; flex-wrap:wrap; }

  /* ===== EMPTY ===== */
  .empty { text-align:center; padding:48px 20px; color:var(--muted); }
  .empty-icon { font-size:40px; margin-bottom:12px; opacity:0.4; }
  .empty p { font-size:14px; }

  /* ===== TOAST ===== */
  .toast {
    position:fixed; bottom:24px; right:24px; background:var(--success); color:#fff;
    padding:12px 20px; border-radius:10px; font-size:13px; font-weight:600;
    transform:translateY(80px); transition:.3s; z-index:9999;
  }
  .toast.show { transform:translateY(0); }
</style>
</head>
<body>

<!-- LOGIN -->
<div id="login-screen">
  <div class="login-box">
    <div style="display:flex;justify-content:center;margin-bottom:4px;">
      <svg width="180" height="60" viewBox="0 0 180 60" fill="none" xmlns="http://www.w3.org/2000/svg">
        <text x="90" y="50" font-family="'Arial Black','Impact','DM Sans',sans-serif" font-size="52" font-weight="900" text-anchor="middle" fill="url(#loginTextGrad)" letter-spacing="-1">climb</text>
        <defs>
          <linearGradient id="loginTextGrad" x1="0" y1="0" x2="1" y2="0">
            <stop offset="0%" stop-color="#FF6B35"/>
            <stop offset="60%" stop-color="#FFB800"/>
            <stop offset="100%" stop-color="#FFD700"/>
          </linearGradient>
        </defs>
      </svg>
    </div>
    <div class="login-sub" style="font-size:11px;letter-spacing:.12em;text-transform:uppercase;margin-bottom:28px;">Marketing Digital · Calendario</div>
    <div style="font-size:12px;color:var(--muted);margin-bottom:10px;">Seleccionar usuario:</div>
    <div class="login-label" id="user-buttons">
      <button class="user-btn" data-user="admin" onclick="selectUser(this)">Admin</button>
      <button class="user-btn" data-user="kevin" onclick="selectUser(this)">Kevin</button>
      <button class="user-btn" data-user="jose" onclick="selectUser(this)">Jose</button>
      <button class="user-btn" data-user="elias" onclick="selectUser(this)">Elias</button>
      <button class="user-btn" data-user="rocio" onclick="selectUser(this)">Rocio</button>
    </div>
    <input class="login-pass" type="password" id="login-pass" placeholder="Contraseña" autocomplete="current-password">
    <button class="login-btn" onclick="doLogin()">Ingresar →</button>
    <div class="login-error" id="login-error"></div>
    <div style="font-size:11px;color:var(--muted);margin-top:20px;">Demo: contraseña = nombre en minúsculas (ej: kevin)</div>
  </div>
</div>

<!-- APP -->
<div id="app">
  <nav class="sidebar">
    <div class="sidebar-logo">
      <svg width="120" height="40" viewBox="0 0 120 40" fill="none" xmlns="http://www.w3.org/2000/svg">
        <text x="60" y="34" font-family="'Arial Black','Impact','DM Sans',sans-serif" font-size="34" font-weight="900" text-anchor="middle" fill="url(#sideTextGrad)" letter-spacing="-1">climb</text>
        <defs>
          <linearGradient id="sideTextGrad" x1="0" y1="0" x2="1" y2="0">
            <stop offset="0%" stop-color="#FF6B35"/>
            <stop offset="60%" stop-color="#FFB800"/>
            <stop offset="100%" stop-color="#FFD700"/>
          </linearGradient>
        </defs>
      </svg>
      <p style="margin-top:-4px;">Gestión de publicaciones</p>
    </div>
    <div class="nav" id="nav-items"></div>
    <div style="padding:6px 16px;border-top:1px solid var(--border);"><span id="online-status" style="font-size:11px;color:var(--success);">🟢 Conectando...</span></div>
  <div class="sidebar-user">
      <div class="avatar" id="user-avatar"></div>
      <div class="sidebar-user-info">
        <strong id="user-name-display"></strong>
        <span id="user-role-display"></span>
      </div>
      <button class="logout-btn" onclick="logout()" title="Cerrar sesión">⏏</button>
    </div>
  </nav>
  <main class="main">
    <div class="page active" id="page-dashboard"></div>
    <div class="page" id="page-publicaciones"></div>
    <div class="page" id="page-cooperativas"></div>
    <div class="page" id="page-ccu"></div>
    <div class="page" id="page-festivos"></div>
    <div class="page" id="page-calendario"></div>
  </main>
</div>

<!-- Modal agregar/editar publicación -->
<div class="modal-overlay" id="modal-pub">
  <div class="modal">
    <div class="modal-header">
      <h3 id="modal-pub-title">Nueva Publicación</h3>
      <button class="modal-close" onclick="closeModal('modal-pub')">✕</button>
    </div>
    <div class="modal-body">
      <input type="hidden" id="pub-edit-idx">
      <div class="form-row">
        <label class="form-label">Empresa / Cliente</label>
        <input class="form-input" id="pub-empresa" placeholder="Ej: YUMI">
      </div>
      <div class="form-row-2">
        <div class="form-row" style="margin:0">
          <label class="form-label">Día</label>
          <select class="form-input" id="pub-dia">
            <option value="">— Sin día —</option>
            <option>Lunes</option><option>Martes</option><option>Miercoles</option>
            <option>Jueves</option><option>Viernes</option><option>sabado</option>
          </select>
        </div>
        <div class="form-row" style="margin:0">
          <label class="form-label">Encargado</label>
          <select class="form-input" id="pub-encargado">
            <option value="">— Sin asignar —</option>
            <option>Kevin</option><option>Jose</option><option>Elias</option><option>Rocio</option>
          </select>
        </div>
      </div>
      <div class="form-row">
        <label class="form-label">Contenido / Descripción</label>
        <input class="form-input" id="pub-contenido" placeholder="Ej: sorteo galletita, video promo...">
      </div>
      <div class="form-row">
        <label class="form-label">Estado</label>
        <select class="form-input" id="pub-estado">
          <option>Pendiente</option>
          <option>Diseñando</option>
          <option>Diseñado</option>
          <option>Esperando aprobación</option>
          <option>Programado</option>
          <option>Publicado</option>
          <option>Modificar</option>
        </select>
      </div>
      <div class="form-row">
        <label class="form-label">Sección</label>
        <select class="form-input" id="pub-seccion">
          <option value="pub">Publicaciones Generales</option>
          <option value="coop">Cooperativas</option>
          <option value="ccu">CCU Central</option>
          <option value="fest">Días Festivos</option>
        </select>
      </div>
      <div class="form-row">
        <label class="form-label">Comentario</label>
        <input class="form-input" id="pub-comentario" placeholder="Notas adicionales...">
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closeModal('modal-pub')">Cancelar</button>
      <button class="btn btn-primary" onclick="savePub()">Guardar</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script type="module">
// ==================== DATA ====================
const USERS = {
  admin:  { pass:'admin',  role:'Administrador', color:'#7c6af7', pages:['dashboard','publicaciones','cooperativas','ccu','festivos','calendario'] },
  kevin:  { pass:'kevin',  role:'Diseñador',     color:'#f7916a', pages:['dashboard','publicaciones','cooperativas','ccu','festivos','calendario'] },
  jose:   { pass:'jose',   role:'Diseñador',     color:'#7c6af7', pages:['dashboard','publicaciones','cooperativas','ccu','festivos','calendario'] },
  elias:  { pass:'elias',  role:'Diseñador',     color:'#4fd1c5', pages:['dashboard','publicaciones','festivos','calendario'] },
  rocio:  { pass:'rocio',  role:'Diseñadora',    color:'#f472b6', pages:['dashboard','publicaciones','cooperativas','ccu','festivos','calendario'] },
};

// Data extracted from the spreadsheet
let DATA = {
  pub: [
    {empresa:'YUMI', dia:'Martes', contenido:'Fotos', estado:'Esperando aprobación', encargado:'Kevin', comentario:''},
    {empresa:'YUMI', dia:'Viernes', contenido:'', estado:'Pendiente', encargado:'Elias', comentario:''},
    {empresa:'ph servicios', dia:'Viernes', contenido:'Esperar que pase info', estado:'Pendiente', encargado:'Kevin', comentario:''},
    {empresa:'2025-08-07', dia:'Martes', contenido:'sorteo galletita', estado:'Publicado', encargado:'Kevin', comentario:''},
    {empresa:'2025-08-07', dia:'Jueves', contenido:'promo omo y arcor', estado:'Pendiente', encargado:'', comentario:''},
    {empresa:'Saldiva arq', dia:'Miercoles', contenido:'Fotos', estado:'Pendiente', encargado:'', comentario:''},

// ==================== STATE ====================
let currentUser = null;
let currentPage = 'dashboard';

// ==================== AUTH ====================
function initUserButtons() {
  // Buttons are hardcoded in HTML, just add click handlers
  document.querySelectorAll('.user-btn').forEach(b => {
    b.onclick = () => selectUser(b);
  });
}

function selectUser(btn) {
  document.querySelectorAll('.user-btn').forEach(x => x.classList.remove('active'));
  btn.classList.add('active');
}
window.selectUser = selectUser;

function doLogin() {
  const selected = document.querySelector('.user-btn.active');
  const pass = document.getElementById('login-pass').value.trim();
  const err = document.getElementById('login-error');
  if (!selected) { err.textContent = 'Selecciona un usuario'; return; }
  const u = selected.dataset.user;
  if (pass !== USERS[u].pass) { err.textContent = 'Contraseña incorrecta'; return; }
  currentUser = u;
  err.textContent = '';
  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('app').style.display = 'block';
  initApp();
}

document.getElementById('login-pass').addEventListener('keydown', e => { if(e.key==='Enter') doLogin(); });

function logout() {
  currentUser = null;
  document.getElementById('login-screen').style.display = 'flex';
  document.getElementById('app').style.display = 'none';
  document.getElementById('login-pass').value = '';
  document.querySelectorAll('.user-btn').forEach(x => x.classList.remove('active'));
}

// ==================== APP INIT ====================
const NAV_CONFIG = [
  {id:'dashboard', icon:'🏠', label:'Dashboard'},
  {id:'publicaciones', icon:'📋', label:'Publicaciones'},
  {id:'cooperativas', icon:'🤝', label:'Cooperativas'},
  {id:'ccu', icon:'⚡', label:'CCU Central'},
  {id:'festivos', icon:'🎉', label:'Días Festivos'},
  {id:'calendario', icon:'📅', label:'Calendario'},
];

function initApp() {
  const u = USERS[currentUser];
  // Avatar
  const av = document.getElementById('user-avatar');
  av.style.background = u.color + '33';
  av.style.color = u.color;
  av.style.border = '1px solid ' + u.color + '44';
  av.textContent = currentUser.charAt(0).toUpperCase();
  document.getElementById('user-name-display').textContent = currentUser.charAt(0).toUpperCase() + currentUser.slice(1);
  document.getElementById('user-role-display').textContent = u.role;

  // Nav
  const nav = document.getElementById('nav-items');
  nav.innerHTML = '';
  NAV_CONFIG.forEach(item => {
    if (!u.pages.includes(item.id)) return;
    const btn = document.createElement('button');
    btn.className = 'nav-item' + (item.id === currentPage ? ' active' : '');
    btn.dataset.page = item.id;
    btn.innerHTML = `<span class="icon">${item.icon}</span>${item.label}`;
    btn.onclick = () => goTo(item.id);
    nav.appendChild(btn);
  });

  goTo('dashboard');
}

function goTo(page) {
  currentPage = page;
  document.querySelectorAll('.nav-item').forEach(b => b.classList.toggle('active', b.dataset.page === page));
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  const el = document.getElementById('page-' + page);
  if (el) el.classList.add('active');
  const renderers = {
    dashboard: renderDashboard,
    publicaciones: () => renderTable('pub', 'page-publicaciones', 'Publicaciones Generales', '📋'),
    cooperativas: () => renderTable('coop', 'page-cooperativas', 'Cooperativas', '🤝'),
    ccu: () => renderTable('ccu', 'page-ccu', 'CCU Central', '⚡'),
    festivos: () => renderTable('fest', 'page-festivos', 'Días Festivos', '🎉'),
    calendario: renderCalendario,
  };
  if (renderers[page]) renderers[page]();
}

function renderKanban(items) {
  const states = ['Publicado','Pendiente','Diseñado','Diseñando','Programado','Modificar','Esperando aprobación'];
  const colors = {
    'Publicado':'var(--success)','Pendiente':'var(--warning)','Diseñado':'var(--info)',
    'Diseñando':'var(--accent)','Programado':'var(--accent3)','Modificar':'var(--danger)',
    'Esperando aprobación':'var(--accent2)'
  };
  return `<div class="kanban">${states.map(s => {
    const grp = items.filter(r => r.estado === s);
    if (!grp.length) return '';
    return `<div class="kanban-col">
      <div class="kanban-col-head" style="border-left:3px solid ${colors[s]||'var(--border)'};">
        <h4>${s}</h4>
        <span class="kanban-count">${grp.length}</span>
      </div>
      <div class="kanban-items">
        ${grp.slice(0,10).map(r => `
          <div class="kanban-card">
            <div class="kanban-card-company">${r.empresa||'—'}</div>
            <div class="kanban-card-meta">
              ${r.dia ? `<span class="dia-chip">${r.dia}</span>`:''}
              ${r.encargado ? `<span class="resp-chip resp-${r.encargado.toLowerCase()}">${r.encargado}</span>`:''}
            </div>
            ${r.contenido ? `<div style="font-size:11px;color:var(--muted);margin-top:5px;">${r.contenido}</div>`:''}
          </div>
        `).join('')}
        ${grp.length > 10 ? `<div style="font-size:11px;color:var(--muted);text-align:center;padding:4px;">+${grp.length-10} más</div>`:''}
      </div>
    </div>`;
  }).join('')}</div>`;
}

// ==================== TABLE RENDER ====================
function renderTable(key, pageId, title, icon) {
  const el = document.getElementById(pageId);
  el.innerHTML = `
    <div class="page-header">
      <div>
        <div class="page-title">${icon} ${title}</div>
        <div class="page-sub">${DATA[key].length} publicaciones registradas</div>
      </div>
      <button class="btn btn-primary" onclick="openAddModal('${key}')">+ Nueva</button>
    </div>
    <div class="filters">
      <input class="search-input" id="search-${key}" placeholder="🔍 Buscar empresa, contenido..." oninput="filterTable('${key}','${pageId}')">
      <select class="filter-select" id="filter-est-${key}" onchange="filterTable('${key}','${pageId}')">
        <option value="">Todos los estados</option>
        <option>Publicado</option><option>Pendiente</option><option>Diseñado</option>
        <option>Diseñando</option><option>Programado</option><option>Modificar</option>
        <option>Esperando aprobación</option>
      </select>
      <select class="filter-select" id="filter-enc-${key}" onchange="filterTable('${key}','${pageId}')">
        <option value="">Todos los encargados</option>
        <option>Kevin</option><option>Jose</option><option>Elias</option><option>Rocio</option>
      </select>
      <select class="filter-select" id="filter-dia-${key}" onchange="filterTable('${key}','${pageId}')">
        <option value="">Todos los días</option>
        <option>Lunes</option><option>Martes</option><option>Miercoles</option>
        <option>Jueves</option><option>Viernes</option><option>sabado</option>
      </select>
    </div>
    <div class="table-wrap" id="table-${key}">
      ${buildTableHTML(key, DATA[key])}
    </div>
  `;
}

function filterTable(key, pageId) {
  const q = (document.getElementById('search-'+key)||{}).value?.toLowerCase()||'';
  const est = (document.getElementById('filter-est-'+key)||{}).value||'';
  const enc = (document.getElementById('filter-enc-'+key)||{}).value||'';
  const dia = (document.getElementById('filter-dia-'+key)||{}).value||'';
  const filtered = DATA[key].filter(r => {
    const matchQ = !q || (r.empresa+r.contenido+r.comentario).toLowerCase().includes(q);
    const matchE = !est || r.estado === est;
    const matchN = !enc || r.encargado === enc;
    const matchD = !dia || r.dia === dia;
    return matchQ && matchE && matchN && matchD;
  });
  document.getElementById('table-'+key).innerHTML = buildTableHTML(key, filtered);
}

function buildTableHTML(key, rows) {
  if (!rows.length) return `<div class="empty"><div class="empty-icon">🔍</div><p>No hay resultados con estos filtros</p></div>`;
  return `<table>
    <thead><tr>
      <th>Empresa / Cliente</th><th>Día</th><th>Contenido</th>
      <th>Estado</th><th>Encargado</th><th>Comentario</th><th></th>
    </tr></thead>
    <tbody>${rows.map((r,i) => {
      const idx = DATA[key].indexOf(r);
      return `<tr>
        <td><strong>${r.empresa||'—'}</strong></td>
        <td>${r.dia ? `<span class="dia-chip">${r.dia}</span>` : '<span style="color:var(--muted)">—</span>'}</td>
        <td style="color:var(--muted);font-size:12px;">${r.contenido||'—'}</td>
        <td>${badgeHTML(r.estado)}</td>
        <td>${r.encargado ? `<span class="resp-chip resp-${r.encargado.toLowerCase()}">${r.encargado}</span>` : '<span style="color:var(--muted)">—</span>'}</td>
        <td style="color:var(--muted);font-size:12px;">${r.comentario||'—'}</td>
        <td style="white-space:nowrap;">
          <button class="btn btn-ghost btn-sm" onclick="openEditModal('${key}',${idx})">✏️</button>
          <button class="btn btn-sm" style="background:rgba(240,107,107,0.1);color:var(--danger);border:1px solid transparent;margin-left:4px;" onclick="deletePub('${key}',${idx})">🗑️</button>
        </td>
      </tr>`;
    }).join('')}</tbody>
  </table>`;
}

function badgeHTML(estado) {
  if (!estado) return '<span class="badge badge-na">—</span>';
  const cls = {
    'Publicado':'badge-publicado','Pendiente':'badge-pendiente','Diseñado':'badge-disenado',
    'Diseñando':'badge-disenando','Programado':'badge-programado','Modificar':'badge-modificar',
    'Esperando aprobación':'badge-esp'
  }[estado] || 'badge-na';
  return `<span class="badge ${cls}">${estado}</span>`;
}

let editKey = null;

function openAddModal(key) {
  editKey = key;
  document.getElementById('pub-edit-idx').value = '';
  document.getElementById('modal-pub-title').textContent = 'Nueva Publicación';
  ['pub-empresa','pub-dia','pub-encargado','pub-contenido','pub-estado','pub-comentario'].forEach(id => {
    document.getElementById(id).value = '';
  });

  document.getElementById('pub-seccion').value = secMap[key]||'pub';
  openModal('modal-pub');
}

function openEditModal(key, idx) {
  editKey = key;
  const r = DATA[key][idx];
  document.getElementById('pub-edit-idx').value = idx;
  document.getElementById('modal-pub-title').textContent = 'Editar Publicación';
  document.getElementById('pub-empresa').value = r.empresa||'';
  document.getElementById('pub-dia').value = r.dia||'';
  document.getElementById('pub-encargado').value = r.encargado||'';
  document.getElementById('pub-contenido').value = r.contenido||'';
  document.getElementById('pub-estado').value = r.estado||'Pendiente';
  document.getElementById('pub-comentario').value = r.comentario||'';
  const secMap = {pub:'pub',coop:'coop',ccu:'ccu',fest:'fest'};
  document.getElementById('pub-seccion').value = secMap[key]||'pub';
  openModal('modal-pub');
}

function savePub() {
  const empresa = document.getElementById('pub-empresa').value.trim();
  if (!empresa) { showToast('Ingresa el nombre de la empresa', true); return; }
  const record = {
    empresa, dia: document.getElementById('pub-dia').value,
    contenido: document.getElementById('pub-contenido').value,
    estado: document.getElementById('pub-estado').value,
    encargado: document.getElementById('pub-encargado').value,
    comentario: document.getElementById('pub-comentario').value,
  };
  const key = document.getElementById('pub-seccion').value;
  const idx = document.getElementById('pub-edit-idx').value;
  if (idx !== '') {
    DATA[editKey||key][parseInt(idx)] = record;
    showToast('Publicación actualizada ✓');
  } else {
    DATA[key].push(record);
    showToast('Publicación agregada ✓');
  }
  closeModal('modal-pub');
  goTo(currentPage);
}

function deletePub(key, idx) {
  if (!confirm('¿Eliminar esta publicación?')) return;
  DATA[key].splice(idx, 1);
  showToast('Eliminado ✓');
  goTo(currentPage);
}

function openModal(id) { document.getElementById(id).classList.add('open'); }
function closeModal(id) { document.getElementById(id).classList.remove('open'); }
document.getElementById('modal-pub').addEventListener('click', e => { if(e.target.id==='modal-pub') closeModal('modal-pub'); });

function setOnlineStatus(online) {
  const el = document.getElementById('online-status');
  if (!el) return;
  el.textContent = online ? '🟢 En línea' : '🔴 Sin conexión';
  el.style.color = online ? 'var(--success)' : 'var(--danger)';

// Cargar datos iniciales desde Firestore y escuchar cambios en tiempo real
function initFirebase() {
  SECTIONS.forEach(sec => {
    const col = collection(db, sec);
    onSnapshot(col, snapshot => {
      DATA[sec] = [];
      snapshot.forEach(d => {
        DATA[sec].push({ _id: d.id, ...d.data() });
      });
      setOnlineStatus(true);
      // Si el usuario ya está logueado y está viendo esta sección, refrescar
      if (currentUser) {
        const pageMap = { pub:'publicaciones', coop:'cooperativas', ccu:'ccu', fest:'festivos' };
        if (currentPage === pageMap[sec] || currentPage === 'dashboard') {
          goTo(currentPage);
        }
      }
    }, err => {
      setOnlineStatus(false);
      console.error('Firebase error:', err);
    });
  });
}

async function saveToFirestore(key, record, existingId) {
  const id = existingId || (Date.now().toString() + Math.random().toString(36).slice(2,6));
  await setDoc(doc(db, key, id), record);
  return id;
}

// Eliminar de Firestore
async function deleteFromFirestore(key, id) {
  await deleteDoc(doc(db, key, id));
}

// ==================== OVERRIDE savePub & deletePub con Firebase ====================
async function savePub() {
  const empresa = document.getElementById('pub-empresa').value.trim();
  if (!empresa) { showToast('Ingresa el nombre de la empresa', true); return; }
  const record = {
    empresa,
    dia: document.getElementById('pub-dia').value,
    contenido: document.getElementById('pub-contenido').value,
    estado: document.getElementById('pub-estado').value,
    encargado: document.getElementById('pub-encargado').value,
    comentario: document.getElementById('pub-comentario').value,
  };
  const key = document.getElementById('pub-seccion').value;
  const idxStr = document.getElementById('pub-edit-idx').value;
  
  showToast('Guardando...⏳');
  try {
    if (idxStr !== '') {
      const existingId = DATA[editKey||key][parseInt(idxStr)]?._id;
      await saveToFirestore(editKey||key, record, existingId);
      showToast('Publicación actualizada ✓');
    } else {
      await saveToFirestore(key, record, null);
      showToast('Publicación agregada ✓');
    }
    closeModal('modal-pub');
  } catch(e) {
    showToast('Error al guardar. Verificá tu conexión.', true);
    console.error(e);
  }
}

async function deletePub(key, idx) {
  if (!confirm('¿Eliminar esta publicación?')) return;
  const id = DATA[key][idx]?._id;
  if (!id) return;
  try {
    await deleteFromFirestore(key, id);
    showToast('Eliminado ✓');
  } catch(e) {
    showToast('Error al eliminar', true);
  }
}
